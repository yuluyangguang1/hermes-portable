<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Hermes Portable — 漫画风格</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; padding:48px; }
  h1 { text-align:center; color:#000; font-family:'Courier New',monospace; font-size:32px; font-weight:900; letter-spacing:4px; margin-bottom:4px; text-transform:uppercase; }
  .sub { text-align:center; color:#666; font-size:13px; letter-spacing:3px; margin-bottom:40px; font-family:'Courier New',monospace; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; max-width:840px; margin:0 auto; }
  .card { text-align:center; padding:16px; border:2px solid #000; }
  .card:hover { background:#f5f5f5; }
  .card svg { width:120px; height:120px; }
  .card p { color:#000; font-family:'Courier New',monospace; font-size:13px; font-weight:700; margin-top:12px; }
  .card .num { color:#999; font-size:11px; display:block; margin-bottom:4px; font-weight:400; }
  .footer { text-align:center; color:#ccc; font-size:10px; letter-spacing:3px; margin-top:40px; font-family:'Courier New',monospace; }
</style>
</head>
<body>
<h1>Hermes Portable</h1>
<p class="sub">MANGA STYLE · マンガ · 黑白漫画风</p>

</div>
<div class="footer">HERMES PORTABLE · MANGA EDITION · マンガ</div>

</html>
