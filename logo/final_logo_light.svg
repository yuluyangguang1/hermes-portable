<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!--
    Hermes Portable Logo — Manga Edition (Final)
    Hermes messenger god portrait, manga style
    Version: Light background (black on white)
  -->
  <g>
    <!-- ═══ Petasos Hat (winged) ═══ -->
    <!-- Hat dome -->
    <path d="M 28 22 Q 28 4, 50 4 Q 72 4, 72 22" fill="black"/>
    <!-- Hat brim -->
    <ellipse cx="50" cy="22" rx="34" ry="7" fill="black"/>
    <!-- Hat shine -->
    <path d="M 36 12 Q 36 6, 50 6 Q 56 6, 58 10 L 52 14 Z" fill="white" opacity="0.2"/>

    <!-- ═══ Wings on Hat ═══ -->
    <!-- Left wing -->
    <path d="M 22 22 C 12 12, 2 14, 4 22 C 5 28, 12 30, 18 28 C 14 30, 8 28, 8 24 C 8 20, 14 18, 22 22 Z" fill="black"/>
    <!-- Right wing -->
    <path d="M 78 22 C 88 12, 98 14, 96 22 C 95 28, 88 30, 82 28 C 86 30, 92 28, 92 24 C 92 20, 86 18, 78 22 Z" fill="black"/>
    <!-- Wing highlights -->
    <path d="M 20 20 C 14 14, 6 16, 8 22 L 14 22 Z" fill="white" opacity="0.15"/>
    <path d="M 80 20 C 86 14, 94 16, 92 22 L 86 22 Z" fill="white" opacity="0.15"/>

    <!-- ═══ Face ═══ -->
    <ellipse cx="50" cy="50" rx="22" ry="24" fill="black"/>

    <!-- ═══ Eyes (large manga style) ═══ -->
    <!-- Left eye -->
    <ellipse cx="41" cy="46" rx="6" ry="7" fill="white"/>
    <circle cx="42" cy="46" r="3.5" fill="black"/>
    <circle cx="43" cy="44" r="1.3" fill="white"/>
    <circle cx="40" cy="47" r="0.6" fill="white" opacity="0.5"/>
    <!-- Right eye -->
    <ellipse cx="59" cy="46" rx="6" ry="7" fill="white"/>
    <circle cx="58" cy="46" r="3.5" fill="black"/>
    <circle cx="59" cy="44" r="1.3" fill="white"/>
    <circle cx="56" cy="47" r="0.6" fill="white" opacity="0.5"/>

    <!-- Eyebrows -->
    <path d="M 34 38 Q 41 34, 48 38" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 52 38 Q 59 34, 66 38" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M 50 50 L 48 56" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

    <!-- Mouth -->
    <path d="M 43 62 Q 50 67, 57 62" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Upper teeth hint -->
    <path d="M 46 62 L 54 62" fill="none" stroke="white" stroke-width="0.6" opacity="0.4"/>

    <!-- Cheek highlights -->
    <ellipse cx="36" cy="56" rx="4" ry="2.5" fill="white" opacity="0.08"/>
    <ellipse cx="64" cy="56" rx="4" ry="2.5" fill="white" opacity="0.08"/>

    <!-- Face shine -->
    <ellipse cx="56" cy="38" rx="7" ry="12" fill="white" opacity="0.1"/>

    <!-- ═══ USB Pendant (earring) ═══ -->
    <line x1="68" y1="54" x2="72" y2="62" stroke="black" stroke-width="2"/>
    <rect x="68" y="62" width="8" height="10" rx="1.5" fill="black"/>
    <rect x="70" y="58" width="4" height="6" rx="1" fill="black"/>
    <!-- USB pendant highlight -->
    <rect x="69" y="63" width="2" height="7" rx="1" fill="white" opacity="0.5"/>
  </g>
</svg>
