name: Build Universal

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Each platform job builds with --layout universal, which produces
#   venv-<platform>/ and python-<platform>/ (and node-<platform>/)
# instead of plain venv/. The merge job then overlays all three onto a
# single shared-base (which contains launchers, data/, hermes-agent/).

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build
        run: python3 build.py --layout universal
      - name: Upload shared base (launchers, data, hermes-agent, uv)
        uses: actions/upload-artifact@v4
        with:
          name: shared-base
          path: |
            dist/HermesPortable/
            !dist/HermesPortable/venv-*/
            !dist/HermesPortable/python-*/
            !dist/HermesPortable/node-*/
      - name: Upload macOS venv/python/node
        uses: actions/upload-artifact@v4
        with:
          name: macos-runtime
          path: |
            dist/HermesPortable/venv-macos-arm64/
            dist/HermesPortable/python-macos-arm64/
            dist/HermesPortable/node-macos-arm64/
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y git curl
      - name: Build
        run: python3 build.py --layout universal
      - name: Upload Linux venv/python/node
        uses: actions/upload-artifact@v4
        with:
          name: linux-runtime
          path: |
            dist/HermesPortable/venv-linux-x64/
            dist/HermesPortable/python-linux-x64/
            dist/HermesPortable/node-linux-x64/
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build
        shell: bash
        run: python build.py --layout universal
      - name: Upload Windows venv/python/node
        uses: actions/upload-artifact@v4
        with:
          name: windows-runtime
          path: |
            dist/HermesPortable/venv-windows-x64/
            dist/HermesPortable/python-windows-x64/
            dist/HermesPortable/node-windows-x64/
          if-no-files-found: warn

  merge-and-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble Universal
        run: |
          set -e
          mkdir -p HermesPortable
          # shared-base contains launchers, data/, hermes-agent/, uv, README, ...
          cp -a artifacts/shared-base/. HermesPortable/
          for rt in macos-runtime linux-runtime windows-runtime; do
            if [ -d "artifacts/$rt" ]; then
              cp -a "artifacts/$rt/." HermesPortable/
              echo "  merged $rt"
            else
              echo "  ! $rt missing — skipping"
            fi
          done
          du -sh HermesPortable/
          ls HermesPortable/

      - name: Build Universal zip
        run: zip -rq HermesPortable-Universal.zip HermesPortable/

      # NOTE: per-platform zips (macOS/Linux/Windows) are already produced
      # by .github/workflows/build.yml, which uses the default --layout
      # (plain venv/, python/, node/ — directly usable by the launchers).
      # Earlier revisions here rebuilt them from the universal layout by
      # renaming venv-<platform>/ → venv/, but that leaves pyvenv.cfg
      # pointing at python-<platform>/ (now missing), producing a broken
      # venv. The single-platform zips are build.yml's job, not ours.
      # This job only produces HermesPortable-Universal.zip.

      # IMPORTANT: do NOT set body_path or generate_release_notes here.
      # build.yml writes the release body; if this workflow also wrote
      # one, the last job to finish wins — and because softprops
      # *appends* to existing bodies on update, v0.13.2/0.13.3 ended up
      # with "Full Changelog: …" duplicated twice.
      # This step only uploads the Universal zip; body stays whatever
      # build.yml composed.
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-Universal.zip
          fail_on_unmatched_files: false
