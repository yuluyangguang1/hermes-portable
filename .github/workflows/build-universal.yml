name: Build Universal Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS version
        run: python3 build.py
      - name: Prepare platform-specific artifacts
        run: |
          cd dist/HermesPortable
          # Copy (not move) platform-specific dirs with new names
          cp -r venv venv-macos-arm64
          cp -r python python-macos-arm64
          # Remove originals to keep shared artifact clean
          rm -rf venv python
      - name: Upload shared base
        uses: actions/upload-artifact@v4
        with:
          name: shared-base
          path: dist/HermesPortable/
      - name: Upload macOS venv
        uses: actions/upload-artifact@v4
        with:
          name: venv-macos-arm64
          path: dist/HermesPortable/venv-macos-arm64/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y git curl
      - name: Build Linux version
        run: python3 build.py
      - name: Upload Linux venv
        uses: actions/upload-artifact@v4
        with:
          name: venv-linux-x64
          path: dist/HermesPortable/venv/
      - name: Upload Linux python
        uses: actions/upload-artifact@v4
        with:
          name: python-linux-x64
          path: dist/HermesPortable/python/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows version
        run: python build_windows.py
      - name: Upload Windows venv
        uses: actions/upload-artifact@v4
        with:
          name: venv-windows-x64
          path: dist/HermesPortable/venv/
      - name: Upload Windows python
        uses: actions/upload-artifact@v4
        with:
          name: python-windows-x64
          path: dist/HermesPortable/python/

  merge-and-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos-arm64, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge all platforms
        run: |
          # Start with shared base (hermes-agent, node, data, launchers)
          cp -r artifacts/shared-base/ HermesPortable/

          # Add each platform's venv + python
          cp -r artifacts/venv-macos-arm64/ HermesPortable/venv-macos-arm64/
          cp -r artifacts/venv-linux-x64/ HermesPortable/venv-linux-x64/
          cp -r artifacts/python-linux-x64/ HermesPortable/python-linux-x64/
          cp -r artifacts/venv-windows-x64/ HermesPortable/venv-windows-x64/
          cp -r artifacts/python-windows-x64/ HermesPortable/python-windows-x64/

          echo "=== Final structure ==="
          ls -la HermesPortable/
          du -sh HermesPortable/venv-*/
          du -sh HermesPortable/python-*/
          du -sh HermesPortable/

      - name: Create universal archive
        run: zip -r HermesPortable-Universal.zip HermesPortable/

      - name: Also create per-platform archives
        run: |
          # macOS only
          mkdir -p macos-only
          cp -r artifacts/shared-base/* macos-only/
          cp -r artifacts/venv-macos-arm64/ macos-only/venv
          # macOS uses same python as build (already in shared-base or use system)
          zip -r HermesPortable-macOS.zip macos-only/

          # Linux only
          mkdir -p linux-only
          cp -r artifacts/shared-base/* linux-only/
          cp -r artifacts/venv-linux-x64/ linux-only/venv
          cp -r artifacts/python-linux-x64/ linux-only/python
          zip -r HermesPortable-Linux.zip linux-only/

          # Windows only
          mkdir -p windows-only
          cp -r artifacts/shared-base/* windows-only/
          cp -r artifacts/venv-windows-x64/ windows-only/venv
          cp -r artifacts/python-windows-x64/ windows-only/python
          zip -r HermesPortable-Windows.zip windows-only/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-Universal.zip
            HermesPortable-macOS.zip
            HermesPortable-Linux.zip
            HermesPortable-Windows.zip
          generate_release_notes: true
