name: Build Universal

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: python3 build.py
      - name: Rename venv
        run: |
          cd dist/HermesPortable
          mv venv ../venv-macos-arm64
          mv python ../python-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: shared-base
          path: dist/HermesPortable/
      - uses: actions/upload-artifact@v4
        with:
          name: venv-macos-arm64
          path: dist/venv-macos-arm64/
      - uses: actions/upload-artifact@v4
        with:
          name: python-macos-arm64
          path: dist/python-macos-arm64/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: python3 build.py
      - uses: actions/upload-artifact@v4
        with:
          name: venv-linux-x64
          path: dist/HermesPortable/venv/
      - uses: actions/upload-artifact@v4
        with:
          name: python-linux-x64
          path: dist/HermesPortable/python/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: python build_windows.py
      - uses: actions/upload-artifact@v4
        with:
          name: venv-windows-x64
          path: dist/HermesPortable/venv/
      - uses: actions/upload-artifact@v4
        with:
          name: python-windows-x64
          path: dist/HermesPortable/python/

  merge-and-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge all platforms
        run: |
          cp -r artifacts/shared-base/ HermesPortable/
          cp -r artifacts/venv-macos-arm64/ HermesPortable/venv-macos-arm64/
          cp -r artifacts/python-macos-arm64/ HermesPortable/python-macos-arm64/
          cp -r artifacts/venv-linux-x64/ HermesPortable/venv-linux-x64/
          cp -r artifacts/python-linux-x64/ HermesPortable/python-linux-x64/
          cp -r artifacts/venv-windows-x64/ HermesPortable/venv-windows-x64/
          cp -r artifacts/python-windows-x64/ HermesPortable/python-windows-x64/
          ls -la HermesPortable/
          du -sh HermesPortable/

      - name: Create archives
        run: |
          zip -r HermesPortable-Universal.zip HermesPortable/

          # Per-platform
          mkdir -p macos-only && cp -r artifacts/shared-base/* macos-only/
          cp -r artifacts/venv-macos-arm64/ macos-only/venv
          cp -r artifacts/python-macos-arm64/ macos-only/python
          zip -r HermesPortable-macOS.zip macos-only/

          mkdir -p linux-only && cp -r artifacts/shared-base/* linux-only/
          cp -r artifacts/venv-linux-x64/ linux-only/venv
          cp -r artifacts/python-linux-x64/ linux-only/python
          zip -r HermesPortable-Linux.zip linux-only/

          mkdir -p windows-only && cp -r artifacts/shared-base/* windows-only/
          cp -r artifacts/venv-windows-x64/ windows-only/venv
          cp -r artifacts/python-windows-x64/ windows-only/python
          zip -r HermesPortable-Windows.zip windows-only/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-Universal.zip
            HermesPortable-macOS.zip
            HermesPortable-Linux.zip
            HermesPortable-Windows.zip
          generate_release_notes: true
