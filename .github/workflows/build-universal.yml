name: Build Universal

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Each platform job builds with --layout universal, which produces
#   venv-<platform>/ and python-<platform>/ (and node-<platform>/)
# instead of plain venv/. The merge job then overlays all five onto a
# single shared-base (which contains launchers, data/, hermes-agent/).
#
# Runtimes shipped in Universal:
#   macos-arm64  (macos-latest)
#   macos-x64    (macos-15-intel — macos-13 retired 2025-12-08; macos-15-intel
#                is the last Intel macOS image, available until Aug 2027)
#   linux-x64    (ubuntu-latest)
#   linux-arm64  (ubuntu-24.04-arm — GA for public repos in early 2025)
#   windows-x64  (windows-latest — Node.js has no Windows arm64 prebuilt)

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build
        run: python3 build.py --layout universal
      - name: Upload shared base (launchers, data, hermes-agent, uv)
        uses: actions/upload-artifact@v4
        with:
          name: shared-base
          path: |
            dist/HermesPortable/
            !dist/HermesPortable/venv-*/
            !dist/HermesPortable/python-*/
            !dist/HermesPortable/node-*/
      - name: Upload macOS arm64 venv/python/node
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-runtime
          path: |
            dist/HermesPortable/venv-macos-arm64/
            dist/HermesPortable/python-macos-arm64/
            dist/HermesPortable/node-macos-arm64/
          if-no-files-found: warn

  build-macos-x64:
    runs-on: macos-15-intel
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build
        run: python3 build.py --layout universal
      - name: Upload macOS x64 venv/python/node
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-runtime
          path: |
            dist/HermesPortable/venv-macos-x64/
            dist/HermesPortable/python-macos-x64/
            dist/HermesPortable/node-macos-x64/
          if-no-files-found: warn

  build-linux-x64:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y git curl
      - name: Build
        run: python3 build.py --layout universal
      - name: Upload Linux x64 venv/python/node
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-runtime
          path: |
            dist/HermesPortable/venv-linux-x64/
            dist/HermesPortable/python-linux-x64/
            dist/HermesPortable/node-linux-x64/
          if-no-files-found: warn

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y git curl
      - name: Build
        run: python3 build.py --layout universal
      - name: Upload Linux arm64 venv/python/node
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-runtime
          path: |
            dist/HermesPortable/venv-linux-arm64/
            dist/HermesPortable/python-linux-arm64/
            dist/HermesPortable/node-linux-arm64/
          if-no-files-found: warn

  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Build
        shell: bash
        run: python build.py --layout universal
      - name: Upload Windows x64 venv/python/node
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-runtime
          path: |
            dist/HermesPortable/venv-windows-x64/
            dist/HermesPortable/python-windows-x64/
            dist/HermesPortable/node-windows-x64/
          if-no-files-found: warn

  merge-and-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-macos-arm64
      - build-macos-x64
      - build-linux-x64
      - build-linux-arm64
      - build-windows-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble Universal
        run: |
          set -e
          mkdir -p HermesPortable
          # shared-base contains launchers, data/, hermes-agent/, uv, README, ...
          cp -a artifacts/shared-base/. HermesPortable/
          for rt in macos-arm64-runtime macos-x64-runtime linux-x64-runtime linux-arm64-runtime windows-x64-runtime; do
            if [ -d "artifacts/$rt" ]; then
              cp -a "artifacts/$rt/." HermesPortable/
              echo "  merged $rt"
            else
              echo "  ! $rt missing — skipping"
            fi
          done
          du -sh HermesPortable/
          ls HermesPortable/

      - name: Build Universal zip
        run: |
          set -e
          # See build.yml 'Create archives' step for the long version
          # of why this chmod is needed. Short version: upload-artifact
          # @v4 does not guarantee exec bits survive the macOS-runner
          # → Linux-runner round trip, so macOS Finder refuses to
          # double-click Hermes.command with "您没有权限执行". Fix it
          # here on the merge runner, right before zipping.
          for f in HermesPortable/Hermes.command HermesPortable/Hermes.sh \
                   HermesPortable/update.sh HermesPortable/linux-rebuild.sh \
                   HermesPortable/uv; do
            [ -f "$f" ] && chmod +x "$f"
          done
          for bindir in HermesPortable/venv-*/bin \
                        HermesPortable/python-*/*/bin \
                        HermesPortable/node-*/bin; do
            [ -d "$bindir" ] && find "$bindir" -type f -exec chmod +x {} +
          done
          # zip -y preserves symlinks inside node-*/bin (npm → ../lib/…)
          # and records Unix mode from the filesystem, so macOS Archive
          # Utility unpacks everything with exec bits intact.
          zip -yrq HermesPortable-Universal.zip HermesPortable/

      # NOTE: per-platform zips (macOS-arm64/macOS-x64/Linux-x64/Linux-arm64/
      # Windows-x64) are produced by .github/workflows/build.yml, which uses
      # the default --layout (plain venv/, python/, node/ — directly usable
      # by the launchers). Earlier revisions here rebuilt them from the
      # universal layout by renaming venv-<platform>/ → venv/, but that
      # leaves pyvenv.cfg pointing at python-<platform>/ (now missing),
      # producing a broken venv. The single-platform zips are build.yml's
      # job, not ours. This job only produces HermesPortable-Universal.zip.

      # IMPORTANT: do NOT set body_path or generate_release_notes here.
      # build.yml writes the release body; if this workflow also wrote
      # one, the last job to finish wins — and because softprops
      # *appends* to existing bodies on update, v0.13.2/0.13.3 ended up
      # with "Full Changelog: …" duplicated twice.
      # This step only uploads the Universal zip; body stays whatever
      # build.yml composed.
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-Universal.zip
          fail_on_unmatched_files: false
