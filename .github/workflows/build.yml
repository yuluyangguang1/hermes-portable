name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,    label: macOS,   artifact: macOS }
          - { os: ubuntu-latest,   label: Linux,   artifact: Linux }
          - { os: windows-latest,  label: Windows, artifact: Windows }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y git curl

      - name: Debug environment
        shell: bash
        run: |
          python --version
          git --version
          curl --version | head -1
          python -c "import platform; print('platform:', platform.system(), platform.machine())"

      - name: Build
        # Single entry-point on all three platforms.
        shell: bash
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/HermesPortable/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Show artifacts
        run: |
          ls -la artifacts/
          for d in artifacts/*/; do du -sh "$d"; done

      - name: Create archives
        run: |
          set -e
          cd artifacts
          for p in macOS Linux Windows; do
            if [ -d "$p" ]; then
              zip -rq "../HermesPortable-$p.zip" "$p"
              echo "  packed HermesPortable-$p.zip"
            else
              echo "  ! $p artifact missing"
            fi
          done

      # Build a consistent, informative release body. softprops'
      # generate_release_notes=true appends GitHub's auto-summary
      # (commits + PRs) *below* this body. Keeping the stable parts
      # (download table, platform requirements, first-run guide) in
      # the body means every release has the same useful shape even
      # if no humans are around to write notes.
      - name: Compose release notes
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          {
            echo "# Hermes Portable $TAG"
            echo
            echo "> Zero-install [Hermes Agent](https://github.com/NousResearch/hermes-agent) · download, extract, double-click"
            echo "> 无需安装 · 下载解压即用 · 零痕迹 · 三平台原生"
            echo
            echo "## 下载 Downloads"
            echo
            echo "| 平台 | 文件 | 启动方式 |"
            echo "|---|---|---|"
            echo "| **macOS** (arm64/x64) | [HermesPortable-macOS.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/HermesPortable-macOS.zip) | 双击 \`Hermes.command\` |"
            echo "| **Linux** (glibc 2.28+) | [HermesPortable-Linux.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/HermesPortable-Linux.zip) | \`./Hermes.sh\` |"
            echo "| **Windows** 10/11 (Early Beta) | [HermesPortable-Windows.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/HermesPortable-Windows.zip) | 双击 \`Hermes.bat\` |"
            echo "| 🌍 **Universal** (三合一 / all three) | [HermesPortable-Universal.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/HermesPortable-Universal.zip) | 一包跨三平台 / one pack for any OS |"
            echo
            echo "## 首次使用 Quick start"
            echo
            echo "1. 解压到任意位置——桌面、硬盘、U 盘、移动硬盘都行"
            echo "   (Windows 注意：避开深路径 / 中文路径 / OneDrive 同步目录)"
            echo "2. 双击对应平台的启动器"
            echo "3. 首次启动自动打开 <http://127.0.0.1:17520> ，填 API Key → 保存 → 启动"
            echo
            echo "## 零痕迹保证 Zero-trace guarantee"
            echo
            echo "启动器会在程序目录里建 \`_home/\` 沙箱，劫持 \`HOME\` / \`USERPROFILE\`，所有走 \`~/.hermes\` 的读写都落到程序目录内的 \`data/\` 里。宿主机的真 \`~/.hermes\` / \`%USERPROFILE%\\.hermes\` 从不接触——删掉 HermesPortable 文件夹（或拔 U 盘），什么都带走，什么都没留下。"
            echo
            echo "## SHA-256"
            echo
            echo "\`\`\`"
            sha256sum HermesPortable-*.zip 2>/dev/null || shasum -a 256 HermesPortable-*.zip
            echo "\`\`\`"
            echo
            echo "> Universal 包由 \`.github/workflows/build-universal.yml\` 单独构建并上传到本 release。"
            echo
            echo "---"
            echo
          } > release-notes.md
          echo "===== release-notes.md ====="
          cat release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-macOS.zip
            HermesPortable-Linux.zip
            HermesPortable-Windows.zip
          body_path: release-notes.md
          # generate_release_notes places GitHub's auto-summary
          # (commits + PRs since last tag) *after* body_path content.
          generate_release_notes: true
          fail_on_unmatched_files: false
