name: Build Universal

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build
        run: python system/tools/build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Universal
          path: dist/HermesPortable/
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create archives
        run: |
          set -e
          cd artifacts
          for p in Universal; do
            if [ -d "$p" ]; then
              cd "$p"
              # Fix permissions for all binaries
              chmod +x *.command *.sh 2>/dev/null || true
              chmod +x runtime/*/venv/bin/* 2>/dev/null || true
              chmod +x runtime/venv/bin/* 2>/dev/null || true
              chmod +x runtime/*/node/bin/* 2>/dev/null || true
              chmod +x runtime/node/bin/* 2>/dev/null || true
              chmod +x runtime/*/python/bin/* 2>/dev/null || true
              chmod +x runtime/python/bin/* 2>/dev/null || true
              chmod +x uv 2>/dev/null || true
              zip -r "../../HermesPortable-${p}.zip" .
              cd ..
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hermes Portable ${{ github.ref_name }}
          files: |
            HermesPortable-Universal.zip
          generate_release_notes: true
