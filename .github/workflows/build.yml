name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: python3 build.py
      - uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: dist/HermesPortable/

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y git curl
      - name: Build
        run: python3 build.py
      - uses: actions/upload-artifact@v4
        with:
          name: Linux
          path: dist/HermesPortable/

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        id: build
        shell: bash
        run: |
          echo "=== System Info ==="
          python --version
          git --version
          curl --version | head -1
          echo "=== Starting build ==="
          python build_windows.py || {
            echo "=== Build failed, trying fallback ==="
            # Try with more verbose output
            python -u build_windows.py
          }
      - uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: Windows
          path: dist/HermesPortable/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: List available artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -la artifacts/
          for d in artifacts/*/; do
            echo "--- $d ---"
            du -sh "$d"
          done

      - name: Create archives
        run: |
          cd artifacts
          if [ -d "macOS" ]; then
            zip -r ../HermesPortable-macOS.zip macOS/
          else
            echo "macOS artifact not found, skipping"
          fi
          if [ -d "Linux" ]; then
            zip -r ../HermesPortable-Linux.zip Linux/
          else
            echo "Linux artifact not found, skipping"
          fi
          if [ -d "Windows" ]; then
            zip -r ../HermesPortable-Windows.zip Windows/
          else
            echo "Windows artifact not found, skipping"
          fi

      - name: Collect release files
        run: |
          echo "HermesPortable-macOS.zip" >> release_files.txt
          echo "HermesPortable-Linux.zip" >> release_files.txt
          echo "HermesPortable-Windows.zip" >> release_files.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-macOS.zip
            HermesPortable-Linux.zip
            HermesPortable-Windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
