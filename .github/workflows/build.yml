name: Build & Release All Platforms

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - macos
          - linux
          - windows
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == '' || github.event.inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS version
        run: python3 build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HermesPortable-macOS
          path: dist/HermesPortable/

  build-linux:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == '' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y git curl
      - name: Build Linux version
        run: python3 build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HermesPortable-Linux
          path: dist/HermesPortable/

  build-windows:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == '' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows version
        run: python build_windows.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HermesPortable-Windows
          path: dist/HermesPortable/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create archives
        run: |
          cd artifacts
          zip -r ../HermesPortable-macOS.zip HermesPortable-macOS/
          zip -r ../HermesPortable-Linux.zip HermesPortable-Linux/
          zip -r ../HermesPortable-Windows.zip HermesPortable-Windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-macOS.zip
            HermesPortable-Linux.zip
            HermesPortable-Windows.zip
          generate_release_notes: true
