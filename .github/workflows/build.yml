name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: |
          echo "=== System Info ==="
          python3 --version
          git --version
          echo "=== Starting build ==="
          python3 build.py
          echo "=== Build done ==="
          ls -la dist/HermesPortable/
          du -sh dist/HermesPortable/
      - uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: dist/HermesPortable/

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y git curl
      - name: Build
        run: |
          echo "=== System Info ==="
          python3 --version
          git --version
          echo "=== Starting build ==="
          python3 build.py
          echo "=== Build done ==="
          ls -la dist/HermesPortable/
          du -sh dist/HermesPortable/
      - uses: actions/upload-artifact@v4
        with:
          name: Linux
          path: dist/HermesPortable/

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: |
          python --version
          git --version
          echo "=== Starting build ==="
          python build_windows.py
          echo "=== Build done ==="
          dir dist\HermesPortable
      - uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: dist/HermesPortable/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create archives
        run: |
          cd artifacts
          zip -r ../HermesPortable-macOS.zip macOS/
          zip -r ../HermesPortable-Linux.zip Linux/
          zip -r ../HermesPortable-Windows.zip Windows/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-macOS.zip
            HermesPortable-Linux.zip
            HermesPortable-Windows.zip
          generate_release_notes: true
