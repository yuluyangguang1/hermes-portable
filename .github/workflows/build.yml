name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,    label: macOS,   artifact: macOS }
          - { os: ubuntu-latest,   label: Linux,   artifact: Linux }
          - { os: windows-latest,  label: Windows, artifact: Windows }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y git curl

      - name: Debug environment
        shell: bash
        run: |
          python --version
          git --version
          curl --version | head -1
          python -c "import platform; print('platform:', platform.system(), platform.machine())"

      - name: Build
        # Single entry-point on all three platforms.
        shell: bash
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/HermesPortable/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Show artifacts
        run: |
          ls -la artifacts/
          for d in artifacts/*/; do du -sh "$d"; done

      - name: Create archives
        run: |
          set -e
          cd artifacts
          for p in macOS Linux Windows; do
            if [ -d "$p" ]; then
              # upload-artifact@v4 does not guarantee exec bits survive
              # the macOS-runner → Linux-runner round trip. If a user's
              # downloaded Hermes.command lands at mode 0644, macOS
              # Finder refuses to double-click it with "您没有权限
              # 执行"/"permission denied". Restore exec bits here, on
              # the zip-assembly runner, before archiving — that is the
              # only step guaranteed to run on Linux and whose output
              # actually ships to users.
              #
              # zip -y preserves symlinks; zip records stored Unix mode
              # from the filesystem, so once we chmod these, macOS
              # Archive Utility unpacks them with mode 0755 intact.
              for f in "$p"/Hermes.command "$p"/Hermes.sh \
                       "$p"/update.sh "$p"/linux-rebuild.sh \
                       "$p"/uv; do
                [ -f "$f" ] && chmod +x "$f"
              done
              # Also: venv bin-scripts and the portable python binaries
              # lose exec bits the same way. Walk both common locations.
              for bindir in "$p"/venv/bin "$p"/venv-*/bin \
                            "$p"/python/*/bin "$p"/python-*/*/bin \
                            "$p"/node/bin "$p"/node-*/bin; do
                [ -d "$bindir" ] && find "$bindir" -type f -exec chmod +x {} +
              done
              zip -yrq "../HermesPortable-$p.zip" "$p"
              echo "  packed HermesPortable-$p.zip"
            else
              echo "  ! $p artifact missing"
            fi
          done

      # Build a consistent, informative release body. softprops'
      # generate_release_notes=true appends GitHub's auto-summary
      # (commits + PRs) *below* this body. Keeping the stable parts
      # (download table, platform requirements, first-run guide) in
      # the body means every release has the same useful shape even
      # if no humans are around to write notes.
      - name: Compose release notes
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          {
            echo "# Hermes Portable $TAG"
            echo
            echo "> Plug-in-a-USB [Hermes Agent](https://github.com/NousResearch/hermes-agent) · zero-install, zero-trace, cross-platform"
            echo "> 插上U盘即用 · 零安装 · 零痕迹 · 三平台原生"
            echo
            echo "## 下载 Downloads"
            echo
            echo "| 平台 | 文件 | 启动方式 |"
            echo "|---|---|---|"
            echo "| **macOS** (arm64/x64) | [HermesPortable-macOS.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/HermesPortable-macOS.zip) | 双击 \`Hermes.command\` |"
            echo "| **Linux** (glibc 2.28+) | [HermesPortable-Linux.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/HermesPortable-Linux.zip) | \`./Hermes.sh\` |"
            echo "| **Windows** 10/11 (Early Beta) | [HermesPortable-Windows.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/HermesPortable-Windows.zip) | 双击 \`Hermes.bat\` |"
            echo "| 🌍 **Universal** (三合一 / all three) | [HermesPortable-Universal.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/HermesPortable-Universal.zip) | U 盘多机共用 / USB for any box |"
            echo
            echo "## 首次使用 Quick start"
            echo
            echo "1. 解压到 U 盘或任意目录（Windows 避免深路径，260 字符限制）"
            echo "2. 双击对应平台的启动器"
            echo "3. 首次启动自动打开 <http://127.0.0.1:17520> ，填 API Key → 保存 → 启动"
            echo
            echo "## 零痕迹保证 Zero-trace guarantee"
            echo
            echo "启动器在 U 盘里建 \`_home/\` 沙箱，劫持 \`HOME\` / \`USERPROFILE\`，所有走 \`~/.hermes\` 的读写都落到 U 盘的 \`data/\` 里。宿主机的真 \`~/.hermes\` / \`%USERPROFILE%\\.hermes\` 从不接触——拔 U 盘，什么都带走，什么都没留下。"
            echo
            echo "## macOS: 首次双击提示「您没有权限」/「无法打开」"
            echo
            echo "macOS 会给从浏览器下载的 zip 盖 Gatekeeper 隔离标记，解压后双击 \`Hermes.command\` 会被拒。打开\"终端\" (Terminal)，用下面两条命令解除一次即可（第一条移除隔离标记，第二条恢复可执行权限）："
            echo
            echo "\`\`\`bash"
            echo "# 把下一行里的路径替换成你自己的 HermesPortable 文件夹"
            echo "cd ~/Downloads/HermesPortable"
            echo "xattr -cr . && chmod +x Hermes.command Hermes.sh"
            echo "\`\`\`"
            echo
            echo "之后再双击 \`Hermes.command\` 就正常了。（这是 macOS 对未公证应用的默认行为，不是 Hermes 的 bug。）"
            echo
            echo "## SHA-256"
            echo
            echo "\`\`\`"
            sha256sum HermesPortable-*.zip 2>/dev/null || shasum -a 256 HermesPortable-*.zip
            echo "\`\`\`"
            echo
            echo "> Universal 包由 \`.github/workflows/build-universal.yml\` 单独构建并上传到本 release。"
            echo
            echo "---"
            echo
          } > release-notes.md
          echo "===== release-notes.md ====="
          cat release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-macOS.zip
            HermesPortable-Linux.zip
            HermesPortable-Windows.zip
          body_path: release-notes.md
          # generate_release_notes places GitHub's auto-summary
          # (commits + PRs since last tag) *after* body_path content.
          generate_release_notes: true
          fail_on_unmatched_files: false
