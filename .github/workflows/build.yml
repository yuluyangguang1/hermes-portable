name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,    label: macOS,   artifact: macOS }
          - { os: ubuntu-latest,   label: Linux,   artifact: Linux }
          - { os: windows-latest,  label: Windows, artifact: Windows }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y git curl

      - name: Debug environment
        shell: bash
        run: |
          python --version
          git --version
          curl --version | head -1
          python -c "import platform; print('platform:', platform.system(), platform.machine())"

      - name: Build
        # Single entry-point on all three platforms.
        shell: bash
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/HermesPortable/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Show artifacts
        run: |
          ls -la artifacts/
          for d in artifacts/*/; do du -sh "$d"; done

      - name: Create archives
        run: |
          set -e
          cd artifacts
          for p in macOS Linux Windows; do
            if [ -d "$p" ]; then
              zip -rq "../HermesPortable-$p.zip" "$p"
              echo "  packed HermesPortable-$p.zip"
            else
              echo "  ! $p artifact missing"
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            HermesPortable-macOS.zip
            HermesPortable-Linux.zip
            HermesPortable-Windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
